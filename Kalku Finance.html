<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Finance</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tab {
            padding: 15px 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .tab:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

        .tab.active {
            background: white;
            color: #1e3c72;
        }

        .calculator-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }

        .calculator-card.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2d3748;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #4299e1;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .result-box {
            margin-top: 30px;
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            color: white;
            display: none;
        }

        .result-box.show {
            display: block;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        .result-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .result-label {
            font-weight: 600;
        }

        .result-value {
            font-size: 1.3em;
            font-weight: 700;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            h1 {
                font-size: 1.8em;
            }
        }

        .info-text {
            color: #718096;
            font-size: 0.9em;
            margin-top: 5px;
        }

        .breakdown-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
        }

        .breakdown-table th,
        .breakdown-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .breakdown-table th {
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 Kalkulator Finance All-in-One</h1>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('investasi')">📈 Investasi</button>
            <button class="tab" onclick="switchTab('kredit')">🏦 Kredit/Pinjaman</button>
            <button class="tab" onclick="switchTab('pensiun')">👴 Dana Pensiun</button>
            <button class="tab" onclick="switchTab('pajak')">📋 Pajak PPh21</button>
            <button class="tab" onclick="switchTab('bunga')">💵 Bunga Majemuk</button>
        </div>

        <!-- Kalkulator Investasi -->
        <div id="investasi" class="calculator-card active">
            <h2>📈 Kalkulator Return Investasi (ROI)</h2>
            <div class="form-group">
                <label>Modal Awal (Rp)</label>
                <input type="number" id="inv-modal" placeholder="10000000">
            </div>
            <div class="form-group">
                <label>Nilai Akhir Investasi (Rp)</label>
                <input type="number" id="inv-akhir" placeholder="15000000">
            </div>
            <div class="form-group">
                <label>Biaya Investasi (Rp)</label>
                <input type="number" id="inv-biaya" placeholder="0">
                <div class="info-text">Fee, komisi, atau biaya lainnya</div>
            </div>
            <button class="btn" onclick="hitungInvestasi()">Hitung ROI</button>
            <div id="result-investasi" class="result-box"></div>
        </div>

        <!-- Kalkulator Kredit -->
        <div id="kredit" class="calculator-card">
            <h2>🏦 Kalkulator Kredit/Pinjaman</h2>
            <div class="form-group">
                <label>Jumlah Pinjaman (Rp)</label>
                <input type="number" id="kredit-jumlah" placeholder="100000000">
            </div>
            <div class="form-group">
                <label>Bunga per Tahun (%)</label>
                <input type="number" id="kredit-bunga" placeholder="8" step="0.1">
            </div>
            <div class="form-group">
                <label>Jangka Waktu (Tahun)</label>
                <input type="number" id="kredit-tahun" placeholder="10">
            </div>
            <button class="btn" onclick="hitungKredit()">Hitung Cicilan</button>
            <div id="result-kredit" class="result-box"></div>
        </div>

        <!-- Kalkulator Pensiun -->
        <div id="pensiun" class="calculator-card">
            <h2>👴 Kalkulator Dana Pensiun</h2>
            <div class="form-group">
                <label>Usia Sekarang (Tahun)</label>
                <input type="number" id="pensiun-usia" placeholder="30">
            </div>
            <div class="form-group">
                <label>Usia Pensiun (Tahun)</label>
                <input type="number" id="pensiun-target" placeholder="60">
            </div>
            <div class="form-group">
                <label>Dana yang Dibutuhkan Saat Pensiun (Rp)</label>
                <input type="number" id="pensiun-target-dana" placeholder="5000000000">
            </div>
            <div class="form-group">
                <label>Return Investasi per Tahun (%)</label>
                <input type="number" id="pensiun-return" placeholder="10" step="0.1">
            </div>
            <div class="form-group">
                <label>Tabungan Saat Ini (Rp)</label>
                <input type="number" id="pensiun-modal" placeholder="50000000">
            </div>
            <button class="btn" onclick="hitungPensiun()">Hitung Dana Pensiun</button>
            <div id="result-pensiun" class="result-box"></div>
        </div>

        <!-- Kalkulator Pajak -->
        <div id="pajak" class="calculator-card">
            <h2>📋 Kalkulator Pajak PPh21</h2>
            <div class="form-group">
                <label>Gaji per Bulan (Rp)</label>
                <input type="number" id="pajak-gaji" placeholder="10000000">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="pajak-status">
                    <option value="TK0">TK/0 - Tidak Kawin, Tanpa Tanggungan</option>
                    <option value="TK1">TK/1 - Tidak Kawin, 1 Tanggungan</option>
                    <option value="TK2">TK/2 - Tidak Kawin, 2 Tanggungan</option>
                    <option value="TK3">TK/3 - Tidak Kawin, 3 Tanggungan</option>
                    <option value="K0">K/0 - Kawin, Tanpa Tanggungan</option>
                    <option value="K1">K/1 - Kawin, 1 Tanggungan</option>
                    <option value="K2">K/2 - Kawin, 2 Tanggungan</option>
                    <option value="K3">K/3 - Kawin, 3 Tanggungan</option>
                </select>
            </div>
            <div class="form-group">
                <label>Tunjangan (Rp/bulan)</label>
                <input type="number" id="pajak-tunjangan" placeholder="0">
            </div>
            <div class="form-group">
                <label>Iuran Pensiun/BPJS (Rp/bulan)</label>
                <input type="number" id="pajak-iuran" placeholder="0">
            </div>
            <button class="btn" onclick="hitungPajak()">Hitung Pajak</button>
            <div id="result-pajak" class="result-box"></div>
        </div>

        <!-- Kalkulator Bunga Majemuk -->
        <div id="bunga" class="calculator-card">
            <h2>💵 Kalkulator Bunga Majemuk</h2>
            <div class="form-group">
                <label>Modal Awal (Rp)</label>
                <input type="number" id="bunga-modal" placeholder="10000000">
            </div>
            <div class="form-group">
                <label>Setoran Rutin per Bulan (Rp)</label>
                <input type="number" id="bunga-setoran" placeholder="1000000">
            </div>
            <div class="form-group">
                <label>Return per Tahun (%)</label>
                <input type="number" id="bunga-rate" placeholder="12" step="0.1">
            </div>
            <div class="form-group">
                <label>Jangka Waktu (Tahun)</label>
                <input type="number" id="bunga-tahun" placeholder="10">
            </div>
            <button class="btn" onclick="hitungBungaMajemuk()">Hitung Bunga Majemuk</button>
            <div id="result-bunga" class="result-box"></div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.calculator-card').forEach(card => card.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName).classList.add('active');
        }

        function formatRupiah(angka) {
            return 'Rp ' + angka.toLocaleString('id-ID');
        }

        function hitungInvestasi() {
            const modal = parseFloat(document.getElementById('inv-modal').value) || 0;
            const akhir = parseFloat(document.getElementById('inv-akhir').value) || 0;
            const biaya = parseFloat(document.getElementById('inv-biaya').value) || 0;

            const profit = akhir - modal - biaya;
            const roi = ((profit / (modal + biaya)) * 100).toFixed(2);

            const resultBox = document.getElementById('result-investasi');
            resultBox.innerHTML = `
                <div class="result-item">
                    <span class="result-label">Modal Awal:</span>
                    <span class="result-value">${formatRupiah(modal)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Nilai Akhir:</span>
                    <span class="result-value">${formatRupiah(akhir)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Profit/Loss:</span>
                    <span class="result-value" style="color: ${profit >= 0 ? '#48bb78' : '#f56565'}">${formatRupiah(profit)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">ROI:</span>
                    <span class="result-value" style="color: ${roi >= 0 ? '#48bb78' : '#f56565'}">${roi}%</span>
                </div>
            `;
            resultBox.classList.add('show');
        }

        function hitungKredit() {
            const jumlah = parseFloat(document.getElementById('kredit-jumlah').value) || 0;
            const bungaTahunan = parseFloat(document.getElementById('kredit-bunga').value) || 0;
            const tahun = parseFloat(document.getElementById('kredit-tahun').value) || 0;

            const bungaBulanan = bungaTahunan / 100 / 12;
            const jumlahBulan = tahun * 12;
            
            const cicilanBulanan = jumlah * (bungaBulanan * Math.pow(1 + bungaBulanan, jumlahBulan)) / (Math.pow(1 + bungaBulanan, jumlahBulan) - 1);
            const totalBayar = cicilanBulanan * jumlahBulan;
            const totalBunga = totalBayar - jumlah;

            const resultBox = document.getElementById('result-kredit');
            resultBox.innerHTML = `
                <div class="result-item">
                    <span class="result-label">Cicilan per Bulan:</span>
                    <span class="result-value">${formatRupiah(cicilanBulanan)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Total Pembayaran:</span>
                    <span class="result-value">${formatRupiah(totalBayar)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Total Bunga:</span>
                    <span class="result-value">${formatRupiah(totalBunga)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Jumlah Pinjaman:</span>
                    <span class="result-value">${formatRupiah(jumlah)}</span>
                </div>
            `;
            resultBox.classList.add('show');
        }

        function hitungPensiun() {
            const usiaSekarang = parseFloat(document.getElementById('pensiun-usia').value) || 0;
            const usiaPensiun = parseFloat(document.getElementById('pensiun-target').value) || 0;
            const targetDana = parseFloat(document.getElementById('pensiun-target-dana').value) || 0;
            const returnRate = parseFloat(document.getElementById('pensiun-return').value) || 0;
            const modalSekarang = parseFloat(document.getElementById('pensiun-modal').value) || 0;

            const tahunMenabung = usiaPensiun - usiaSekarang;
            const r = returnRate / 100;
            
            const nilaiModalDiMasaDepan = modalSekarang * Math.pow(1 + r, tahunMenabung);
            const kekuranganDana = targetDana - nilaiModalDiMasaDepan;
            
            let setoranBulanan = 0;
            if (kekuranganDana > 0) {
                const rBulanan = r / 12;
                const nBulan = tahunMenabung * 12;
                setoranBulanan = (kekuranganDana * rBulanan) / (Math.pow(1 + rBulanan, nBulan) - 1);
            }

            const totalSetoran = setoranBulanan * tahunMenabung * 12;

            const resultBox = document.getElementById('result-pensiun');
            resultBox.innerHTML = `
                <div class="result-item">
                    <span class="result-label">Waktu Menabung:</span>
                    <span class="result-value">${tahunMenabung} Tahun</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Setoran Bulanan yang Dibutuhkan:</span>
                    <span class="result-value">${formatRupiah(setoranBulanan)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Total Setoran:</span>
                    <span class="result-value">${formatRupiah(totalSetoran + modalSekarang)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Target Dana Pensiun:</span>
                    <span class="result-value">${formatRupiah(targetDana)}</span>
                </div>
            `;
            resultBox.classList.add('show');
        }

        function hitungPajak() {
            const gajiPokok = parseFloat(document.getElementById('pajak-gaji').value) || 0;
            const status = document.getElementById('pajak-status').value;
            const tunjangan = parseFloat(document.getElementById('pajak-tunjangan').value) || 0;
            const iuran = parseFloat(document.getElementById('pajak-iuran').value) || 0;

            const ptkp = {
                'TK0': 54000000,
                'TK1': 58500000,
                'TK2': 63000000,
                'TK3': 67500000,
                'K0': 58500000,
                'K1': 63000000,
                'K2': 67500000,
                'K3': 72000000
            };

            const penghasilanBruto = (gajiPokok + tunjangan) * 12;
            const biayaJabatan = Math.min(penghasilanBruto * 0.05, 6000000);
            const penghasilanNeto = penghasilanBruto - biayaJabatan - (iuran * 12);
            const pkp = Math.max(penghasilanNeto - ptkp[status], 0);

            let pajak = 0;
            if (pkp <= 60000000) {
                pajak = pkp * 0.05;
            } else if (pkp <= 250000000) {
                pajak = 60000000 * 0.05 + (pkp - 60000000) * 0.15;
            } else if (pkp <= 500000000) {
                pajak = 60000000 * 0.05 + 190000000 * 0.15 + (pkp - 250000000) * 0.25;
            } else if (pkp <= 5000000000) {
                pajak = 60000000 * 0.05 + 190000000 * 0.15 + 250000000 * 0.25 + (pkp - 500000000) * 0.30;
            } else {
                pajak = 60000000 * 0.05 + 190000000 * 0.15 + 250000000 * 0.25 + 4500000000 * 0.30 + (pkp - 5000000000) * 0.35;
            }

            const pajakBulanan = pajak / 12;
            const gajiBersih = gajiPokok + tunjangan - pajakBulanan - iuran;

            const resultBox = document.getElementById('result-pajak');
            resultBox.innerHTML = `
                <div class="result-item">
                    <span class="result-label">Penghasilan Bruto (Tahun):</span>
                    <span class="result-value">${formatRupiah(penghasilanBruto)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">PKP (Penghasilan Kena Pajak):</span>
                    <span class="result-value">${formatRupiah(pkp)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Pajak per Bulan (PPh21):</span>
                    <span class="result-value">${formatRupiah(pajakBulanan)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Gaji Bersih per Bulan:</span>
                    <span class="result-value">${formatRupiah(gajiBersih)}</span>
                </div>
            `;
            resultBox.classList.add('show');
        }

        function hitungBungaMajemuk() {
            const modal = parseFloat(document.getElementById('bunga-modal').value) || 0;
            const setoranBulanan = parseFloat(document.getElementById('bunga-setoran').value) || 0;
            const rate = parseFloat(document.getElementById('bunga-rate').value) || 0;
            const tahun = parseFloat(document.getElementById('bunga-tahun').value) || 0;

            const rBulanan = rate / 100 / 12;
            const nBulan = tahun * 12;

            const nilaiModalAkhir = modal * Math.pow(1 + rBulanan, nBulan);
            const nilaiSetoranAkhir = setoranBulanan * ((Math.pow(1 + rBulanan, nBulan) - 1) / rBulanan);
            const totalAkhir = nilaiModalAkhir + nilaiSetoranAkhir;
            
            const totalSetoran = modal + (setoranBulanan * nBulan);
            const totalBunga = totalAkhir - totalSetoran;

            const resultBox = document.getElementById('result-bunga');
            resultBox.innerHTML = `
                <div class="result-item">
                    <span class="result-label">Nilai Akhir Investasi:</span>
                    <span class="result-value">${formatRupiah(totalAkhir)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Total Setoran:</span>
                    <span class="result-value">${formatRupiah(totalSetoran)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Total Bunga/Return:</span>
                    <span class="result-value">${formatRupiah(totalBunga)}</span>
                </div>
                <div class="result-item">
                    <span class="result-label">Persentase Keuntungan:</span>
                    <span class="result-value">${((totalBunga / totalSetoran) * 100).toFixed(2)}%</span>
                </div>
            `;
            resultBox.classList.add('show');
        }
    </script>
</body>
</html>
